<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Prank</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #00ff00;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .calculator {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            width: 340px;
        }
        
        #display {
            width: 100%;
            height: 80px;
            background: #000;
            color: #00ff00;
            font-size: 2.2rem;
            text-align: right;
            padding: 0 15px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.3);
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 2px;
            overflow: hidden;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            height: 65px;
            font-size: 1.4rem;
            font-family: 'Press Start 2P', monospace;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #000;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }
        
        .number, .decimal {
            background: #333;
            color: #fff;
        }
        
        .operator {
            background: #ff9500;
            color: #fff;
            font-size: 1.6rem;
        }
        
        .equals {
            background: #00ff00;
            color: #111;
            font-weight: bold;
            grid-column: span 2;
        }
        
        .clear {
            background: #ff2d55;
            color: #fff;
            grid-column: span 2;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🧮 CALCULADORA</h1>
    <p class="subtitle">A calculadora que nunca erra... mas outro já calculou 😏</p>
    
    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <!-- Primeira linha -->
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendToDisplay('(')">(</button>
            <button class="operator" onclick="appendToDisplay(')')">)</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            
            <!-- Segunda linha -->
            <button class="number" onclick="appendToDisplay('7')">7</button>
            <button class="number" onclick="appendToDisplay('8')">8</button>
            <button class="number" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <!-- Terceira linha -->
            <button class="number" onclick="appendToDisplay('4')">4</button>
            <button class="number" onclick="appendToDisplay('5')">5</button>
            <button class="number" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">−</button>
            
            <!-- Quarta linha -->
            <button class="number" onclick="appendToDisplay('1')">1</button>
            <button class="number" onclick="appendToDisplay('2')">2</button>
            <button class="number" onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <!-- Quinta linha -->
            <button class="number" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button class="decimal" onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="showPrankResult()">=</button>
        </div>
    </div>
    
    <div class="footer">
        Calculadora 100% funcional... até ao resultado 😂<br>
        <small>Criado especialmente para ti</small>
    </div>

    <script>
        const WARNING_MESSAGE = "Outro usuário já tem o mesmo resultado!";
        
        function appendToDisplay(value) {
            const display = document.getElementById('display');
            
            // Se estiver a mostrar o aviso ou erro, limpa primeiro
            if (display.value === WARNING_MESSAGE || display.value === 'ERRO!') {
                display.value = '';
            }
            
            display.value += value;
        }
        
        function clearDisplay() {
            document.getElementById('display').value = '';
        }
        
        function showPrankResult() {
            const display = document.getElementById('display');
            
            // Se já estiver com o aviso, não faz nada
            if (display.value === WARNING_MESSAGE) return;
            
            let resultText = '';
            
            try {
                // Calcula normalmente (mas não vamos mostrar o resultado real)
                const realResult = eval(display.value);
                
                // Em vez do resultado, mostra o aviso prank
                display.value = WARNING_MESSAGE;
                
                // Efeito extra: pisca o aviso
                display.style.color = '#ff2d55';
                setTimeout(() => {
                    display.style.color = '#00ff00';
                }, 300);
                
            } catch (e) {
                // Se a expressão for inválida
                display.value = 'ERRO!';
                display.style.color = '#ff2d55';
                setTimeout(() => {
                    display.style.color = '#00ff00';
                    display.value = '';
                }, 1500);
            }
        }
        
        // Atalho de teclado (divertido)
        document.addEventListener('keydown', function(e) {
            const display = document.getElementById('display');
            
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                showPrankResult();
            }
            
            if (e.key === 'Escape') {
                clearDisplay();
            }
            
            // Permite digitar números diretamente
            if (/[0-9+\-*/.()]/.test(e.key)) {
                appendToDisplay(e.key);
            }
        });
        
        // Mensagem inicial engraçada
        console.log('%c✅ Calculadora prank carregada com sucesso!', 'color: #00ff00; font-family: monospace; font-size: 14px;');
    </script>
</body>
</html>
